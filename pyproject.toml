[project]
name = "just-py-bash"
version = "0.1.0"
description = "python bindings for just-bash"
readme = "README.md"
authors = [
    { name = "Nathan Gage", email = "nathan@sweetspot.so" }
]
requires-python = ">=3.14"
dependencies = []

[project.scripts]
just-py-bash = "just_py_bash:main"

[build-system]
requires = ["uv_build>=0.11.2,<0.12.0"]
build-backend = "uv_build"
