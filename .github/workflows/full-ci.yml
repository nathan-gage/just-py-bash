name: Full CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
      - ready_for_review
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: full-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    name: detect full-ci conditions
    runs-on: ubuntu-latest
    outputs:
      run_full: ${{ steps.detect.outputs.run_full }}
      release_candidate: ${{ steps.detect.outputs.release_candidate }}
      packaging_changed: ${{ steps.detect.outputs.packaging_changed }}
      reason: ${{ steps.detect.outputs.reason }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect whether full CI should run
        id: detect
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          BEFORE_SHA: ${{ github.event.before || '' }}
          PR_LABELS_JSON: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          from __future__ import annotations

          import fnmatch
          import json
          import os
          import subprocess

          PACKAGING_PATTERNS = [
              ".github/workflows/*",
              "Makefile",
              "pyproject.toml",
              "uv.lock",
              "just_py_bash/pyproject.toml",
              "just_py_bash/hatch_build.py",
              "just_py_bash/tools/*",
              "just_bash_bundled_runtime/pyproject.toml",
              "just_bash_bundled_runtime/hatch_build.py",
              "just_bash_bundled_runtime/tools/*",
              "tests/contracts/test_distributions.py",
          ]

          def changed_files(base: str, head: str, *, use_merge_base: bool) -> list[str]:
              if not base or set(base) == {"0"}:
                  return []

              separator = "..." if use_merge_base else ".."
              completed = subprocess.run(
                  ["git", "diff", "--name-only", f"{base}{separator}{head}"],
                  check=False,
                  capture_output=True,
                  text=True,
              )
              if completed.returncode != 0:
                  raise RuntimeError(completed.stderr.strip() or "git diff failed")
              return [line for line in completed.stdout.splitlines() if line]

          def matches_packaging_paths(paths: list[str]) -> bool:
              return any(
                  any(fnmatch.fnmatch(path, pattern) for pattern in PACKAGING_PATTERNS)
                  for path in paths
              )

          event_name = os.environ["EVENT_NAME"]
          parsed_labels = json.loads(os.environ.get("PR_LABELS_JSON") or "[]")
          if not isinstance(parsed_labels, list):
              parsed_labels = []
          labels = {str(label) for label in parsed_labels}
          release_candidate = "release-candidate" in labels
          packaging_changed = False
          reason_parts: list[str] = []

          if event_name == "workflow_dispatch":
              run_full = True
              release_candidate = True
              packaging_changed = True
              reason_parts.append("workflow_dispatch")
          elif event_name == "pull_request":
              files = changed_files(os.environ.get("BASE_SHA", ""), os.environ["HEAD_SHA"], use_merge_base=True)
              packaging_changed = matches_packaging_paths(files)
              if release_candidate:
                  reason_parts.append("release-candidate label")
              if packaging_changed:
                  reason_parts.append("packaging/workflow changes")
              run_full = release_candidate or packaging_changed
          elif event_name == "push":
              files = changed_files(os.environ.get("BEFORE_SHA", ""), os.environ["HEAD_SHA"], use_merge_base=False)
              packaging_changed = matches_packaging_paths(files)
              if packaging_changed:
                  reason_parts.append("packaging/workflow changes on main")
              run_full = packaging_changed
          else:
              run_full = False

          reason = ", ".join(reason_parts) if reason_parts else "no full-ci trigger"
          print(f"run_full={'true' if run_full else 'false'}")
          print(f"release_candidate={'true' if release_candidate else 'false'}")
          print(f"packaging_changed={'true' if packaging_changed else 'false'}")
          print(f"reason={reason}")
          PY

      - name: Report decision
        run: |
          echo "run_full=${{ steps.detect.outputs.run_full }}"
          echo "release_candidate=${{ steps.detect.outputs.release_candidate }}"
          echo "packaging_changed=${{ steps.detect.outputs.packaging_changed }}"
          echo "reason=${{ steps.detect.outputs.reason }}"

  full:
    name: full / ubuntu / py3.11 / node22
    needs: detect
    if: needs.detect.outputs.run_full == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: vendor/just-bash/pnpm-lock.yaml

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.9

      - name: Install dependencies and build vendored just-bash backend
        run: make install

      - name: Vendor bundled runtime payload
        run: make vendor-bundled-runtime

      - name: Run full CI check suite
        run: make all-ci

      - name: Build main package distributions
        run: uv build just_py_bash --out-dir dist

  bundled-node:
    name: bundled-node / ubuntu / py3.11
    needs: detect
    if: needs.detect.outputs.run_full == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: vendor/just-bash/pnpm-lock.yaml

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.9

      - name: Install dependencies and build vendored just-bash backend
        run: make install

      - name: Vendor bundled runtime payload
        run: make vendor-bundled-runtime

      - name: Install bundled Node provider package
        run: uv pip install ./just_bash_bundled_runtime

      - name: Verify bundled Node works without a system node on PATH
        run: |
          uv run python - <<'PY'
          import os
          import sys

          from just_bash import Bash

          os.environ["PATH"] = os.path.dirname(sys.executable)

          with Bash() as bash:
              result = bash.exec("printf bundled-node")

          assert result.stdout == "bundled-node"
          PY

  compatibility:
    name: compat / ${{ matrix.os }} / py${{ matrix.python-version }} / node${{ matrix.node-version }}
    needs: detect
    if: needs.detect.outputs.run_full == 'true'
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.11"
            node-version: "20"
          - os: ubuntu-latest
            python-version: "3.11"
            node-version: "24"
          - os: ubuntu-latest
            python-version: "3.12"
            node-version: "22"
          - os: macos-latest
            python-version: "3.11"
            node-version: "22"
          - os: windows-latest
            python-version: "3.11"
            node-version: "22"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: vendor/just-bash/pnpm-lock.yaml

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.9

      - name: Sync Python dependencies
        run: uv sync --all-groups

      - name: Build vendored just-bash backend
        working-directory: vendor/just-bash
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Run non-packaging test suite
        run: uv run pytest -q -m "not packaging"

  bundled-runtime-packaging:
    name: bundled-runtime wheel / ${{ matrix.os }}
    needs: detect
    if: needs.detect.outputs.run_full == 'true'
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-13
          - macos-14
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Vendor bundled runtime payload
        run: python just_bash_bundled_runtime/tools/vendor_runtime.py

      - name: Build bundled runtime wheel
        run: uv build just_bash_bundled_runtime --wheel --out-dir dist-node

      - name: Smoke test bundled runtime wheel
        run: |
          python - <<'PY'
          import subprocess
          import sys
          from pathlib import Path

          wheel = next(Path('dist-node').glob('*.whl'))
          install = subprocess.run([sys.executable, '-m', 'pip', 'install', '--force-reinstall', str(wheel)], check=False)
          if install.returncode != 0:
              raise SystemExit(install.returncode)

          from just_bash_bundled_runtime import get_node_command, get_runtime_metadata

          completed = subprocess.run([*get_node_command(), '--version'], check=False, capture_output=True, text=True)
          if completed.returncode != 0:
              raise SystemExit(completed.returncode)

          metadata = get_runtime_metadata()
          print(metadata['node_version'])
          print(metadata['platform'])
          print(completed.stdout.strip())
          PY
