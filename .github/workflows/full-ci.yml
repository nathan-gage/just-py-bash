name: Full CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
      - ready_for_review
  push:
    branches:
      - main
  workflow_dispatch:

env:
  COLUMNS: 150
  UV_FROZEN: "1"
  UV_CACHE_DEPENDENCY_GLOB: |
    pyproject.toml
    uv.lock

permissions:
  contents: read

concurrency:
  group: full-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    name: detect full-ci conditions
    runs-on: ubuntu-latest
    outputs:
      run_full: ${{ steps.detect.outputs.run_full }}
      release_candidate: ${{ steps.detect.outputs.release_candidate }}
      packaging_changed: ${{ steps.detect.outputs.packaging_changed }}
      reason: ${{ steps.detect.outputs.reason }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect whether full CI should run
        id: detect
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          BEFORE_SHA: ${{ github.event.before || '' }}
          PR_LABELS_JSON: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          from __future__ import annotations

          import fnmatch
          import json
          import os
          import subprocess

          PACKAGING_PATTERNS = [
              ".github/workflows/*",
              "Makefile",
              "pyproject.toml",
              "uv.lock",
              "vendor/just-bash",
              "vendor/just-bash/*",
              "vendor/just-bash/**",
              "just_py_bash/pyproject.toml",
              "just_py_bash/hatch_build.py",
              "just_py_bash/tools/*",
              "just_bash_bundled_runtime/pyproject.toml",
              "just_bash_bundled_runtime/hatch_build.py",
              "just_bash_bundled_runtime/tools/*",
              "tests/contracts/test_distributions.py",
          ]

          def changed_files(base: str, head: str, *, use_merge_base: bool) -> list[str]:
              if not base or set(base) == {"0"}:
                  return []

              separator = "..." if use_merge_base else ".."
              completed = subprocess.run(
                  ["git", "diff", "--name-only", f"{base}{separator}{head}"],
                  check=False,
                  capture_output=True,
                  text=True,
              )
              if completed.returncode != 0:
                  raise RuntimeError(completed.stderr.strip() or "git diff failed")
              return [line for line in completed.stdout.splitlines() if line]

          def matches_packaging_paths(paths: list[str]) -> bool:
              return any(
                  any(fnmatch.fnmatch(path, pattern) for pattern in PACKAGING_PATTERNS)
                  for path in paths
              )

          event_name = os.environ["EVENT_NAME"]
          parsed_labels = json.loads(os.environ.get("PR_LABELS_JSON") or "[]")
          if not isinstance(parsed_labels, list):
              parsed_labels = []
          labels = {str(label) for label in parsed_labels}
          release_candidate = "release-candidate" in labels
          packaging_changed = False
          reason_parts: list[str] = []

          if event_name == "workflow_dispatch":
              run_full = True
              release_candidate = True
              packaging_changed = True
              reason_parts.append("workflow_dispatch")
          elif event_name == "pull_request":
              files = changed_files(os.environ.get("BASE_SHA", ""), os.environ["HEAD_SHA"], use_merge_base=True)
              packaging_changed = matches_packaging_paths(files)
              if release_candidate:
                  reason_parts.append("release-candidate label")
              if packaging_changed:
                  reason_parts.append("packaging/workflow changes")
              run_full = release_candidate or packaging_changed
          elif event_name == "push":
              files = changed_files(os.environ.get("BEFORE_SHA", ""), os.environ["HEAD_SHA"], use_merge_base=False)
              packaging_changed = matches_packaging_paths(files)
              if packaging_changed:
                  reason_parts.append("packaging/workflow changes on main")
              run_full = packaging_changed
          else:
              run_full = False

          reason = ", ".join(reason_parts) if reason_parts else "no full-ci trigger"
          print(f"run_full={'true' if run_full else 'false'}")
          print(f"release_candidate={'true' if release_candidate else 'false'}")
          print(f"packaging_changed={'true' if packaging_changed else 'false'}")
          print(f"reason={reason}")
          PY

      - name: Report decision
        run: |
          echo "run_full=${{ steps.detect.outputs.run_full }}"
          echo "release_candidate=${{ steps.detect.outputs.release_candidate }}"
          echo "packaging_changed=${{ steps.detect.outputs.packaging_changed }}"
          echo "reason=${{ steps.detect.outputs.reason }}"

  prepare-backend:
    name: prepare-backend / ubuntu / node22
    needs: detect
    if: needs.detect.outputs.run_full == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 8.15.9

      - name: Set up Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: vendor/just-bash/pnpm-lock.yaml

      - name: Build vendored backend and packaged runtime
        run: make prepare-test-backend

      - name: Record backend artifact metadata
        shell: bash
        run: |
          mkdir -p .ci/backend-artifact
          printf '%s\n' "$GITHUB_SHA" > .ci/backend-artifact/github_sha.txt

      - name: Upload backend assets
        uses: actions/upload-artifact@v6.0.0
        with:
          name: backend-assets
          compression-level: 0
          path: |
            .ci/backend-artifact/github_sha.txt
            just_py_bash/src/just_bash/_vendor/just-bash/package.json
            just_py_bash/src/just_bash/_vendor/just-bash/dist/**
            just_py_bash/src/just_bash/_vendor/just-bash/vendor/**

  prepare-runtime:
    name: prepare-runtime / ubuntu
    needs: detect
    if: needs.detect.outputs.run_full == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Restore cached bundled runtime payload
        id: runtime-cache
        uses: actions/cache@v5.0.4
        with:
          path: |
            just_bash_bundled_runtime/src/just_bash_bundled_runtime/runtime
            just_bash_bundled_runtime/src/just_bash_bundled_runtime/runtime-metadata.json
          key: bundled-runtime-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('just_bash_bundled_runtime/pyproject.toml',
            'just_bash_bundled_runtime/tools/vendor_runtime.py') }}

      - name: Vendor bundled runtime payload
        if: steps.runtime-cache.outputs.cache-hit != 'true'
        run: python just_bash_bundled_runtime/tools/vendor_runtime.py

      - name: Upload bundled runtime assets
        uses: actions/upload-artifact@v6.0.0
        with:
          name: bundled-runtime-assets-ubuntu
          compression-level: 0
          path: |
            just_bash_bundled_runtime/src/just_bash_bundled_runtime/runtime/**
            just_bash_bundled_runtime/src/just_bash_bundled_runtime/runtime-metadata.json

  full:
    name: full / ubuntu / py3.11 / node22
    needs:
      - detect
      - prepare-backend
      - prepare-runtime
    if: needs.detect.outputs.run_full == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.11"
          enable-cache: true
          cache-python: true
          cache-suffix: full
          cache-dependency-glob: ${{ env.UV_CACHE_DEPENDENCY_GLOB }}

      - name: Set up Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: "22"

      - name: Install Python development dependencies
        run: make install-python

      - name: Download backend assets
        uses: actions/download-artifact@v8.0.1
        with:
          name: backend-assets
          path: .

      - name: Verify backend assets and configure packaged runtime env
        shell: python
        run: |
          import os
          from pathlib import Path

          sha_path = Path('.ci/backend-artifact/github_sha.txt')
          actual_sha = sha_path.read_text(encoding='utf-8').strip()
          expected_sha = os.environ['GITHUB_SHA']
          if actual_sha != expected_sha:
              raise SystemExit(f'Backend artifact SHA mismatch: {actual_sha} != {expected_sha}')

          runtime_root = Path('just_py_bash/src/just_bash/_vendor/just-bash').resolve()
          package_json = runtime_root / 'package.json'
          if not package_json.is_file():
              raise SystemExit(f'Missing packaged runtime metadata at {package_json}')

          candidates = [runtime_root / 'dist/index.js', runtime_root / 'dist/bundle/index.js']
          runtime_entry = next((path for path in candidates if path.is_file()), None)
          if runtime_entry is None:
              raise SystemExit(f'Missing packaged runtime entrypoint under {runtime_root}')

          github_env = Path(os.environ['GITHUB_ENV'])
          with github_env.open('a', encoding='utf-8') as handle:
              handle.write(f'JUST_BASH_JS_ENTRY={runtime_entry}\n')
              handle.write(f'JUST_BASH_PACKAGE_JSON={package_json}\n')
              handle.write(f'JUST_BASH_TEST_PACKAGED_JS_ENTRY={runtime_entry}\n')
              handle.write(f'JUST_BASH_TEST_PACKAGED_PACKAGE_JSON={package_json}\n')

      - name: Download bundled runtime assets
        uses: actions/download-artifact@v8.0.1
        with:
          name: bundled-runtime-assets-ubuntu
          path: just_bash_bundled_runtime/src/just_bash_bundled_runtime

      - name: Restore bundled runtime executable permissions
        shell: bash
        run: chmod +x just_bash_bundled_runtime/src/just_bash_bundled_runtime/runtime/bin/node

      - name: Run full CI check suite
        run: make all-ci

      - name: Build main package distributions
        run: uv build just_py_bash --out-dir dist

  bundled-node:
    name: bundled-node / ubuntu / py3.11
    needs:
      - detect
      - prepare-backend
      - prepare-runtime
    if: needs.detect.outputs.run_full == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.11"
          enable-cache: true
          cache-python: true
          cache-suffix: bundled-node
          cache-dependency-glob: ${{ env.UV_CACHE_DEPENDENCY_GLOB }}

      - name: Install Python test dependencies
        run: make install-python-tests

      - name: Download bundled runtime assets
        uses: actions/download-artifact@v8.0.1
        with:
          name: bundled-runtime-assets-ubuntu
          path: just_bash_bundled_runtime/src/just_bash_bundled_runtime

      - name: Restore bundled runtime executable permissions
        shell: bash
        run: chmod +x just_bash_bundled_runtime/src/just_bash_bundled_runtime/runtime/bin/node

      - name: Download backend assets
        uses: actions/download-artifact@v8.0.1
        with:
          name: backend-assets
          path: .

      - name: Verify backend assets and configure packaged runtime env
        shell: python
        run: |
          import os
          from pathlib import Path

          sha_path = Path('.ci/backend-artifact/github_sha.txt')
          actual_sha = sha_path.read_text(encoding='utf-8').strip()
          expected_sha = os.environ['GITHUB_SHA']
          if actual_sha != expected_sha:
              raise SystemExit(f'Backend artifact SHA mismatch: {actual_sha} != {expected_sha}')

          runtime_root = Path('just_py_bash/src/just_bash/_vendor/just-bash').resolve()
          package_json = runtime_root / 'package.json'
          if not package_json.is_file():
              raise SystemExit(f'Missing packaged runtime metadata at {package_json}')

          candidates = [runtime_root / 'dist/index.js', runtime_root / 'dist/bundle/index.js']
          runtime_entry = next((path for path in candidates if path.is_file()), None)
          if runtime_entry is None:
              raise SystemExit(f'Missing packaged runtime entrypoint under {runtime_root}')

          github_env = Path(os.environ['GITHUB_ENV'])
          with github_env.open('a', encoding='utf-8') as handle:
              handle.write(f'JUST_BASH_JS_ENTRY={runtime_entry}\n')
              handle.write(f'JUST_BASH_PACKAGE_JSON={package_json}\n')
              handle.write(f'JUST_BASH_TEST_PACKAGED_JS_ENTRY={runtime_entry}\n')
              handle.write(f'JUST_BASH_TEST_PACKAGED_PACKAGE_JSON={package_json}\n')

      - name: Verify bundled Node works without a system node on PATH
        shell: bash
        run: |
          PYTHONPATH=just_py_bash/src uv run --with ./just_bash_bundled_runtime python - <<'PY'
          import os
          import sys

          from just_bash import Bash

          os.environ["PATH"] = os.path.dirname(sys.executable)

          with Bash() as bash:
              result = bash.exec("printf bundled-node")

          assert result.stdout == "bundled-node"
          PY

  native-build-smoke:
    name: native-build-smoke / ${{ matrix.os }} / node${{ matrix.node-version }}
    needs: detect
    if: needs.detect.outputs.run_full == 'true'
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            node-version: "22"
          - os: windows-latest
            node-version: "22"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 8.15.9

      - name: Set up Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: vendor/just-bash/pnpm-lock.yaml

      - name: Build vendored just-bash from source
        working-directory: vendor/just-bash
        shell: bash
        env:
          npm_config_script_shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            pnpm install --frozen-lockfile --ignore-scripts
            pnpm rebuild esbuild
          else
            pnpm install --frozen-lockfile
          fi
          pnpm build

  runtime-compat:
    name: runtime-compat / ${{ matrix.os }} / py${{ matrix.python-version }} / node${{ matrix.node-version }}
    needs:
      - detect
      - prepare-backend
    if: needs.detect.outputs.run_full == 'true'
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.11"
            node-version: "24"
          - os: ubuntu-latest
            python-version: "3.12"
            node-version: "22"
          - os: ubuntu-latest
            python-version: "3.13"
            node-version: "22"
          - os: ubuntu-latest
            python-version: "3.14"
            node-version: "22"
          - os: macos-14
            python-version: "3.11"
            node-version: "22"
          - os: windows-latest
            python-version: "3.11"
            node-version: "22"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-python: true
          cache-suffix: compat-${{ matrix.os }}-${{ matrix.python-version }}-${{ matrix.node-version }}
          cache-dependency-glob: ${{ env.UV_CACHE_DEPENDENCY_GLOB }}

      - name: Set up Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install Python test dependencies
        run: uv sync --frozen --only-group dev

      - name: Download backend assets
        uses: actions/download-artifact@v8.0.1
        with:
          name: backend-assets
          path: .

      - name: Verify backend assets and configure packaged runtime env
        shell: python
        run: |
          import os
          from pathlib import Path

          sha_path = Path('.ci/backend-artifact/github_sha.txt')
          actual_sha = sha_path.read_text(encoding='utf-8').strip()
          expected_sha = os.environ['GITHUB_SHA']
          if actual_sha != expected_sha:
              raise SystemExit(f'Backend artifact SHA mismatch: {actual_sha} != {expected_sha}')

          runtime_root = Path('just_py_bash/src/just_bash/_vendor/just-bash').resolve()
          package_json = runtime_root / 'package.json'
          if not package_json.is_file():
              raise SystemExit(f'Missing packaged runtime metadata at {package_json}')

          candidates = [runtime_root / 'dist/index.js', runtime_root / 'dist/bundle/index.js']
          runtime_entry = next((path for path in candidates if path.is_file()), None)
          if runtime_entry is None:
              raise SystemExit(f'Missing packaged runtime entrypoint under {runtime_root}')

          github_env = Path(os.environ['GITHUB_ENV'])
          with github_env.open('a', encoding='utf-8') as handle:
              handle.write(f'JUST_BASH_JS_ENTRY={runtime_entry}\n')
              handle.write(f'JUST_BASH_PACKAGE_JSON={package_json}\n')
              handle.write(f'JUST_BASH_TEST_PACKAGED_JS_ENTRY={runtime_entry}\n')
              handle.write(f'JUST_BASH_TEST_PACKAGED_PACKAGE_JSON={package_json}\n')

      - name: Run non-packaging test suite
        if: matrix.os != 'windows-latest'
        run: uv run pytest -q -m "not packaging"

      - name: Run non-packaging test suite (Windows, parallelized)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: COLUMNS=150 uv run pytest -q -n auto --dist=loadgroup --durations=10 -m "not packaging"

  bundled-runtime-packaging:
    name: bundled-runtime wheel / ${{ matrix.os }}
    needs:
      - detect
      - prepare-runtime
    if: needs.detect.outputs.run_full == 'true'
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-14
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.11"
          enable-cache: true
          cache-python: true
          cache-suffix: bundled-runtime-packaging
          cache-dependency-glob: ${{ env.UV_CACHE_DEPENDENCY_GLOB }}

      - name: Download prepared bundled runtime assets
        if: matrix.os == 'ubuntu-latest'
        uses: actions/download-artifact@v8.0.1
        with:
          name: bundled-runtime-assets-ubuntu
          path: just_bash_bundled_runtime/src/just_bash_bundled_runtime

      - name: Restore bundled runtime executable permissions
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: chmod +x just_bash_bundled_runtime/src/just_bash_bundled_runtime/runtime/bin/node

      - name: Restore cached bundled runtime payload
        if: matrix.os != 'ubuntu-latest'
        id: runtime-cache
        uses: actions/cache@v5.0.4
        with:
          path: |
            just_bash_bundled_runtime/src/just_bash_bundled_runtime/runtime
            just_bash_bundled_runtime/src/just_bash_bundled_runtime/runtime-metadata.json
          key: bundled-runtime-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('just_bash_bundled_runtime/pyproject.toml',
            'just_bash_bundled_runtime/tools/vendor_runtime.py') }}

      - name: Vendor bundled runtime payload
        if: matrix.os != 'ubuntu-latest' && steps.runtime-cache.outputs.cache-hit != 'true'
        run: uv run --no-project python just_bash_bundled_runtime/tools/vendor_runtime.py

      - name: Build bundled runtime wheel
        run: uv build just_bash_bundled_runtime --wheel --out-dir dist-node

      - name: Smoke test bundled runtime wheel
        shell: bash
        run: |-
          wheel=$(echo dist-node/*.whl)
          uv run --no-project --with "$wheel" python - <<'PY'
          import subprocess

          from just_bash_bundled_runtime import get_node_command, get_runtime_metadata

          completed = subprocess.run([*get_node_command(), '--version'], check=False, capture_output=True, text=True)
          if completed.returncode != 0:
              raise SystemExit(completed.returncode)

          metadata = get_runtime_metadata()
          print(metadata['node_version'])
          print(metadata['platform'])
          print(completed.stdout.strip())
          PY

  required:
    name: full-ci / required
    needs:
      - detect
      - prepare-backend
      - prepare-runtime
      - full
      - bundled-node
      - native-build-smoke
      - runtime-compat
      - bundled-runtime-packaging
    if: ${{ always() }}
    runs-on: ubuntu-latest

    steps:
      - name: Verify required Full CI jobs passed or were intentionally skipped
        shell: bash
        env:
          RUN_FULL: ${{ needs.detect.outputs.run_full }}
          DETECT_RESULT: ${{ needs.detect.result }}
          PREPARE_BACKEND_RESULT: ${{ needs['prepare-backend'].result }}
          PREPARE_RUNTIME_RESULT: ${{ needs['prepare-runtime'].result }}
          FULL_RESULT: ${{ needs.full.result }}
          BUNDLED_NODE_RESULT: ${{ needs['bundled-node'].result }}
          NATIVE_BUILD_SMOKE_RESULT: ${{ needs['native-build-smoke'].result }}
          RUNTIME_COMPAT_RESULT: ${{ needs['runtime-compat'].result }}
          BUNDLED_RUNTIME_PACKAGING_RESULT: ${{ needs['bundled-runtime-packaging'].result }}
        run: |-
          echo "run_full=$RUN_FULL"
          echo "detect=$DETECT_RESULT"
          echo "prepare-backend=$PREPARE_BACKEND_RESULT"
          echo "prepare-runtime=$PREPARE_RUNTIME_RESULT"
          echo "full=$FULL_RESULT"
          echo "bundled-node=$BUNDLED_NODE_RESULT"
          echo "native-build-smoke=$NATIVE_BUILD_SMOKE_RESULT"
          echo "runtime-compat=$RUNTIME_COMPAT_RESULT"
          echo "bundled-runtime-packaging=$BUNDLED_RUNTIME_PACKAGING_RESULT"

          [[ "$DETECT_RESULT" == "success" ]]

          if [[ "$RUN_FULL" != "true" ]]; then
            echo "Full CI not required for this change."
            exit 0
          fi

          [[ "$PREPARE_BACKEND_RESULT" == "success" ]]
          [[ "$PREPARE_RUNTIME_RESULT" == "success" ]]
          [[ "$FULL_RESULT" == "success" ]]
          [[ "$BUNDLED_NODE_RESULT" == "success" ]]
          [[ "$NATIVE_BUILD_SMOKE_RESULT" == "success" ]]
          [[ "$RUNTIME_COMPAT_RESULT" == "success" ]]
          [[ "$BUNDLED_RUNTIME_PACKAGING_RESULT" == "success" ]]
