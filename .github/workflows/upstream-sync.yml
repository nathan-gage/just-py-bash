name: Sync just-bash

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: Upstream ref to sync vendor/just-bash to
        required: false
        default: origin/main
  schedule:
    - cron: "17 5 * * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: upstream-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Validate workflow ref
        env:
          WORKFLOW_REF: ${{ github.ref }}
        run: |
          case "$WORKFLOW_REF" in
            refs/heads/main) ;;
            *)
              echo "Sync workflow must run from refs/heads/main; got: $WORKFLOW_REF" >&2
              exit 1
              ;;
          esac

      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: main
          submodules: recursive
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.11"
          enable-cache: true
          cache-suffix: upstream-sync

      - name: Ensure automation labels exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create automation --color 0E8A16 --description "Automated pull request" --force
          gh label create upstream-sync --color 1D76DB --description "Updates the vendored just-bash checkout" --force
          gh label create release-candidate --color B60205 --description "Run full CI and auto-tag eligible release PRs when merged" --force

      - name: Sync upstream just-bash
        id: sync
        run: >-
          uv run python just_py_bash/tools/sync_just_bash.py
          --target "${{ github.event.inputs.target_ref || 'origin/main' }}"

      - name: Create release-candidate pull request
        if: steps.sync.outputs.changed == 'true' && steps.sync.outputs.release_candidate == 'true'
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          branch: automation/sync-just-bash
          delete-branch: true
          commit-message: >-
            chore: sync just-bash to
            ${{ steps.sync.outputs.to_version }}
            (${{ steps.sync.outputs.to_sha_short }})
          title: >-
            chore: sync just-bash to
            ${{ steps.sync.outputs.to_version }}
            (${{ steps.sync.outputs.to_sha_short }})
          body: |
            Automated upstream sync.

            - upstream ref: `${{ github.event.inputs.target_ref || 'origin/main' }}`
            - previous sha: `${{ steps.sync.outputs.from_sha }}`
            - requested upstream sha: `${{ steps.sync.outputs.requested_sha }}`
            - synced upstream sha: `${{ steps.sync.outputs.to_sha }}`
            - previous upstream version: `${{ steps.sync.outputs.from_version }}`
            - requested upstream version: `${{ steps.sync.outputs.requested_version }}`
            - synced upstream version: `${{ steps.sync.outputs.to_version }}`
            - selected sync strategy: `${{ steps.sync.outputs.selected_reason }}`
            - pinned to version-introduction commit: `${{ steps.sync.outputs.pinned_to_version_commit }}`
            - release tag on merge: `${{ steps.sync.outputs.release_tag }}`

            `just-py-bash` now uses dynamic versioning from Git tags, so this PR does not bump a static package version in `pyproject.toml`.
            For safety, this sync workflow no longer installs or builds upstream code before review; the normal PR CI and Full CI jobs validate the vendored build after the PR is opened.
            This PR is labeled `release-candidate`, so Full CI will run the expensive packaging and compatibility suite. When it is merged to `main`, the auto-tag workflow will create `${{ steps.sync.outputs.release_tag }}` on the merge commit and the tag-driven release workflow will publish it.
          labels: |
            automation
            upstream-sync
            release-candidate

      - name: Create non-release pull request
        if: steps.sync.outputs.changed == 'true' && steps.sync.outputs.release_candidate != 'true'
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          branch: automation/sync-just-bash
          delete-branch: true
          commit-message: >-
            chore: sync just-bash to
            ${{ steps.sync.outputs.to_version || 'main' }}
            (${{ steps.sync.outputs.to_sha_short }})
          title: >-
            chore: sync just-bash to
            ${{ steps.sync.outputs.to_version || 'main' }}
            (${{ steps.sync.outputs.to_sha_short }})
          body: |
            Automated upstream sync.

            - upstream ref: `${{ github.event.inputs.target_ref || 'origin/main' }}`
            - previous sha: `${{ steps.sync.outputs.from_sha }}`
            - requested upstream sha: `${{ steps.sync.outputs.requested_sha }}`
            - synced upstream sha: `${{ steps.sync.outputs.to_sha }}`
            - previous upstream version: `${{ steps.sync.outputs.from_version }}`
            - requested upstream version: `${{ steps.sync.outputs.requested_version }}`
            - synced upstream version: `${{ steps.sync.outputs.to_version }}`
            - selected sync strategy: `${{ steps.sync.outputs.selected_reason }}`

            `just-py-bash` now derives its package version dynamically from release tags.
            For safety, this sync workflow no longer installs or builds upstream code before review; the normal PR CI jobs validate the vendored build after the PR is opened.
            Upstream changed without a new upstream package version, so this PR is not marked as a release candidate or auto-tagged by default.
          labels: |-
            automation
            upstream-sync
