name: Bundled Runtime Release

on:
  workflow_run:
    workflows:
      - Full CI
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: bundled-runtime-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      tag_exists: ${{ steps.version.outputs.tag_exists }}
      version_changed: ${{ steps.version.outputs.version_changed }}
      ref: ${{ steps.version.outputs.ref }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Read bundled runtime version
        id: version
        shell: bash
        env:
          REF: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          import subprocess
          import tomllib
          from pathlib import Path

          version = tomllib.loads(Path("just_bash_bundled_runtime/pyproject.toml").read_text())["project"]["version"]
          tag = f"just-bash-bundled-runtime-v{version}"
          completed = subprocess.run(
              ["git", "tag", "-l", tag],
              check=True,
              capture_output=True,
              text=True,
          )
          tag_exists = "true" if tag in completed.stdout.splitlines() else "false"

          previous = subprocess.run(
              ["git", "show", "HEAD^:just_bash_bundled_runtime/pyproject.toml"],
              check=False,
              capture_output=True,
              text=True,
          )
          if previous.returncode == 0:
              previous_version = tomllib.loads(previous.stdout)["project"]["version"]
              version_changed = "true" if str(previous_version) != version else "false"
          else:
              version_changed = "true"

          ref = os.environ["REF"]
          print(f"version={version}")
          print(f"tag={tag}")
          print(f"tag_exists={tag_exists}")
          print(f"version_changed={version_changed}")
          print(f"ref={ref}")
          PY

  build:
    name: build / ${{ matrix.os }}
    needs: detect
    if: needs.detect.outputs.tag_exists != 'true' && needs.detect.outputs.version_changed == 'true'
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-13
          - macos-14
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.detect.outputs.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Vendor bundled runtime payload
        run: python just_bash_bundled_runtime/tools/vendor_runtime.py

      - name: Build bundled runtime wheel
        run: uv build just_bash_bundled_runtime --wheel --out-dir dist-node

      - name: Smoke test bundled runtime wheel
        run: |
          python - <<'PY'
          import subprocess
          import sys
          from pathlib import Path

          wheel = next(Path('dist-node').glob('*.whl'))
          install = subprocess.run([sys.executable, '-m', 'pip', 'install', '--force-reinstall', str(wheel)], check=False)
          if install.returncode != 0:
              raise SystemExit(install.returncode)

          from just_bash_bundled_runtime import get_node_command, get_runtime_metadata

          completed = subprocess.run([*get_node_command(), '--version'], check=False, capture_output=True, text=True)
          if completed.returncode != 0:
              raise SystemExit(completed.returncode)

          metadata = get_runtime_metadata()
          print(metadata['node_version'])
          print(metadata['platform'])
          print(completed.stdout.strip())
          PY

      - name: Upload bundled runtime wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundled-runtime-${{ matrix.os }}
          path: dist-node/*

  release:
    needs:
      - detect
      - build
    if: needs.detect.outputs.tag_exists != 'true' && needs.detect.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi-just-bash-bundled-runtime
      url: https://pypi.org/p/just-bash-bundled-runtime

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.detect.outputs.ref }}

      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bundled-runtime-*
          merge-multiple: true
          path: dist-node

      - name: Create and push bundled runtime tag
        env:
          TAG: ${{ needs.detect.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect.outputs.tag }}
          name: just-bash-bundled-runtime ${{ needs.detect.outputs.version }}
          generate_release_notes: true
          files: |
            dist-node/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-node/
          skip-existing: true
