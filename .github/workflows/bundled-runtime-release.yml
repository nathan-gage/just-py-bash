name: Release just-bash-bundled-runtime

on:
  push:
    tags:
      - "runtime/v*"

permissions:
  contents: read

concurrency:
  group: release-just-bash-bundled-runtime-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate release tag semantics and main ancestry
        id: version
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          git fetch origin --force +refs/heads/main:refs/remotes/origin/main
          python tools/release_metadata.py validate-tag bundled-runtime --tag "$TAG_NAME" --github-output
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

  build:
    name: bundled-runtime wheel / ${{ matrix.os }}
    needs: [detect]
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-14
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.11"
          enable-cache: true
          cache-suffix: bundled-runtime-release-build

      - name: Vendor bundled runtime payload
        run: uv run python just_bash_bundled_runtime/tools/vendor_runtime.py

      - name: Build bundled runtime wheel
        run: uv build just_bash_bundled_runtime --wheel --out-dir dist-node

      - name: Validate built wheel version matches tag
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: python tools/release_metadata.py validate-artifacts bundled-runtime --tag "$TAG_NAME" --dist-dir dist-node

      - name: Smoke test bundled runtime wheel
        shell: bash
        run: |
          wheel=$(echo dist-node/*.whl)
          uv run --no-project --with "$wheel" python - <<'PY'
          import subprocess

          from just_bash_bundled_runtime import get_node_command, get_runtime_metadata

          completed = subprocess.run([*get_node_command(), '--version'], check=False, capture_output=True, text=True)
          if completed.returncode != 0:
              raise SystemExit(completed.returncode)

          metadata = get_runtime_metadata()
          print(metadata['node_version'])
          print(metadata['platform'])
          print(completed.stdout.strip())
          PY

      - name: Upload bundled runtime wheel artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: bundled-runtime-${{ matrix.os }}
          path: dist-node/*
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    needs:
      - detect
      - build
    runs-on: ubuntu-latest

    environment:
      name: testpypi-just-bash-bundled-runtime
      url: https://test.pypi.org/project/just-bash-bundled-runtime/

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: bundled-runtime-*
          merge-multiple: true
          path: dist-node

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist-node/
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI
    needs: [publish-testpypi]
    runs-on: ubuntu-latest

    environment:
      name: pypi-just-bash-bundled-runtime
      url: https://pypi.org/project/just-bash-bundled-runtime/

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: bundled-runtime-*
          merge-multiple: true
          path: dist-node

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          packages-dir: dist-node/
          skip-existing: true

  github-release:
    name: Create GitHub release
    needs:
      - detect
      - publish-pypi
    if: needs.publish-pypi.result == 'success'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: bundled-runtime-*
          merge-multiple: true
          path: dist-node

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.detect.outputs.version }}
        run: |-
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist-node/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              --verify-tag \
              --title "just-bash-bundled-runtime $VERSION" \
              --generate-notes \
              --latest \
              dist-node/*
          fi
