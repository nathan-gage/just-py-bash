name: Release just-bash-bundled-runtime

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-just-bash-bundled-runtime-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      tag_exists: ${{ steps.version.outputs.tag_exists }}
      ref: ${{ steps.version.outputs.ref }}

    steps:
      - name: Validate workflow ref
        env:
          WORKFLOW_REF: ${{ github.ref }}
        run: |
          case "$WORKFLOW_REF" in
            refs/heads/main) ;;
            *)
              echo "Release workflows must be dispatched from refs/heads/main; got: $WORKFLOW_REF" >&2
              exit 1
              ;;
          esac

      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: main
          persist-credentials: false

      - name: Read bundled runtime version
        id: version
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import subprocess
          import tomllib
          from pathlib import Path

          version = tomllib.loads(Path("just_bash_bundled_runtime/pyproject.toml").read_text())['project']['version']
          tag = f"just-bash-bundled-runtime-v{version}"
          completed = subprocess.run(
              ["git", "tag", "-l", tag],
              check=True,
              capture_output=True,
              text=True,
          )
          tag_exists = "true" if tag in completed.stdout.splitlines() else "false"
          ref = subprocess.run(
              ["git", "rev-parse", "HEAD"],
              check=True,
              capture_output=True,
              text=True,
          ).stdout.strip()
          print(f"version={version}")
          print(f"tag={tag}")
          print(f"tag_exists={tag_exists}")
          print(f"ref={ref}")
          PY

      - name: Report decision
        run: |
          echo "version=${{ steps.version.outputs.version }}"
          echo "tag=${{ steps.version.outputs.tag }}"
          echo "tag_exists=${{ steps.version.outputs.tag_exists }}"
          echo "ref=${{ steps.version.outputs.ref }}"

      - name: Fail if tag already exists
        if: steps.version.outputs.tag_exists == 'true'
        run: |
          echo "Tag ${{ steps.version.outputs.tag }} already exists."
          exit 1

  build:
    name: build / ${{ matrix.os }}
    needs: detect
    if: needs.detect.outputs.tag_exists != 'true'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-14
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ needs.detect.outputs.ref }}
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.11"
          enable-cache: true
          cache-suffix: bundled-runtime-release-build

      - name: Vendor bundled runtime payload
        run: uv run python just_bash_bundled_runtime/tools/vendor_runtime.py

      - name: Build bundled runtime wheel
        run: uv build just_bash_bundled_runtime --wheel --out-dir dist-node

      - name: Smoke test bundled runtime wheel
        shell: bash
        run: |
          wheel=$(echo dist-node/*.whl)
          uv run --no-project --with "$wheel" python - <<'PY'
          import subprocess

          from just_bash_bundled_runtime import get_node_command, get_runtime_metadata

          completed = subprocess.run([*get_node_command(), '--version'], check=False, capture_output=True, text=True)
          if completed.returncode != 0:
              raise SystemExit(completed.returncode)

          metadata = get_runtime_metadata()
          print(metadata['node_version'])
          print(metadata['platform'])
          print(completed.stdout.strip())
          PY

      - name: Upload bundled runtime wheel artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: bundled-runtime-${{ matrix.os }}
          path: dist-node/*

  release:
    needs:
      - detect
      - build
    if: needs.detect.outputs.tag_exists != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    environment:
      name: pypi-just-bash-bundled-runtime
      url: https://pypi.org/p/just-bash-bundled-runtime

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ needs.detect.outputs.ref }}
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.11"
          enable-cache: true
          cache-suffix: bundled-runtime-release

      - name: Download wheel artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: bundled-runtime-*
          merge-multiple: true
          path: dist-node

      - name: Create and push bundled runtime tag
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG: ${{ needs.detect.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$TAG"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.detect.outputs.tag }}
        run: >-
          gh release create "$TAG" dist-node/*
          --title "just-bash-bundled-runtime ${{ needs.detect.outputs.version }}"
          --generate-notes

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always --check-url https://pypi.org/simple/ dist-node/*
