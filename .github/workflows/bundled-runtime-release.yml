name: Release just-bash-bundled-runtime

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to release
        required: false
        default: main

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-just-bash-bundled-runtime-${{ inputs.ref || github.ref }}
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      tag_exists: ${{ steps.version.outputs.tag_exists }}
      ref: ${{ steps.version.outputs.ref }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}

      - name: Read bundled runtime version
        id: version
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import subprocess
          import tomllib
          from pathlib import Path

          version = tomllib.loads(Path("just_bash_bundled_runtime/pyproject.toml").read_text())['project']['version']
          tag = f"just-bash-bundled-runtime-v{version}"
          completed = subprocess.run(
              ["git", "tag", "-l", tag],
              check=True,
              capture_output=True,
              text=True,
          )
          tag_exists = "true" if tag in completed.stdout.splitlines() else "false"
          ref = subprocess.run(
              ["git", "rev-parse", "HEAD"],
              check=True,
              capture_output=True,
              text=True,
          ).stdout.strip()
          print(f"version={version}")
          print(f"tag={tag}")
          print(f"tag_exists={tag_exists}")
          print(f"ref={ref}")
          PY

      - name: Report decision
        run: |
          echo "version=${{ steps.version.outputs.version }}"
          echo "tag=${{ steps.version.outputs.tag }}"
          echo "tag_exists=${{ steps.version.outputs.tag_exists }}"
          echo "ref=${{ steps.version.outputs.ref }}"

      - name: Fail if tag already exists
        if: steps.version.outputs.tag_exists == 'true'
        run: |
          echo "Tag ${{ steps.version.outputs.tag }} already exists."
          exit 1

  build:
    name: build / ${{ matrix.os }}
    needs: detect
    if: needs.detect.outputs.tag_exists != 'true'
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-13
          - macos-14
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.detect.outputs.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Vendor bundled runtime payload
        run: python just_bash_bundled_runtime/tools/vendor_runtime.py

      - name: Build bundled runtime wheel
        run: uv build just_bash_bundled_runtime --wheel --out-dir dist-node

      - name: Smoke test bundled runtime wheel
        run: |
          python - <<'PY'
          import subprocess
          import sys
          from pathlib import Path

          wheel = next(Path('dist-node').glob('*.whl'))
          install = subprocess.run([sys.executable, '-m', 'pip', 'install', '--force-reinstall', str(wheel)], check=False)
          if install.returncode != 0:
              raise SystemExit(install.returncode)

          from just_bash_bundled_runtime import get_node_command, get_runtime_metadata

          completed = subprocess.run([*get_node_command(), '--version'], check=False, capture_output=True, text=True)
          if completed.returncode != 0:
              raise SystemExit(completed.returncode)

          metadata = get_runtime_metadata()
          print(metadata['node_version'])
          print(metadata['platform'])
          print(completed.stdout.strip())
          PY

      - name: Upload bundled runtime wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundled-runtime-${{ matrix.os }}
          path: dist-node/*

  release:
    needs:
      - detect
      - build
    if: needs.detect.outputs.tag_exists != 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi-just-bash-bundled-runtime
      url: https://pypi.org/p/just-bash-bundled-runtime

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.detect.outputs.ref }}

      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bundled-runtime-*
          merge-multiple: true
          path: dist-node

      - name: Create and push bundled runtime tag
        env:
          TAG: ${{ needs.detect.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect.outputs.tag }}
          name: just-bash-bundled-runtime ${{ needs.detect.outputs.version }}
          generate_release_notes: true
          files: |
            dist-node/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-node/
          skip-existing: true
