name: Release

on:
  workflow_run:
    workflows:
      - Full CI
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      tag_exists: ${{ steps.version.outputs.tag_exists }}
      version_changed: ${{ steps.version.outputs.version_changed }}
      ref: ${{ steps.version.outputs.ref }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          submodules: recursive

      - name: Read package version
        id: version
        shell: bash
        env:
          REF: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          import subprocess
          import tomllib
          from pathlib import Path

          version = tomllib.loads(Path("just_py_bash/pyproject.toml").read_text())["project"]["version"]
          tag = f"v{version}"
          completed = subprocess.run(
              ["git", "tag", "-l", tag],
              check=True,
              capture_output=True,
              text=True,
          )
          tag_exists = "true" if tag in completed.stdout.splitlines() else "false"

          previous = subprocess.run(
              ["git", "show", "HEAD^:just_py_bash/pyproject.toml"],
              check=False,
              capture_output=True,
              text=True,
          )
          if previous.returncode == 0:
              previous_version = tomllib.loads(previous.stdout)["project"]["version"]
              version_changed = "true" if str(previous_version) != version else "false"
          else:
              version_changed = "true"

          ref = os.environ["REF"]
          print(f"version={version}")
          print(f"tag={tag}")
          print(f"tag_exists={tag_exists}")
          print(f"version_changed={version_changed}")
          print(f"ref={ref}")
          PY

  release:
    needs: detect
    if: needs.detect.outputs.tag_exists != 'true' && needs.detect.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi-just-py-bash
      url: https://pypi.org/p/just-py-bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.detect.outputs.ref }}
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: vendor/just-bash/pnpm-lock.yaml

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.9

      - name: Build distributions
        run: make build-package

      - name: Create and push tag
        env:
          TAG: ${{ needs.detect.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
