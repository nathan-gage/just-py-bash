name: Release just-py-bash

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to release
        required: false
        default: main

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-just-py-bash-${{ inputs.ref || github.ref }}
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      tag_exists: ${{ steps.version.outputs.tag_exists }}
      ref: ${{ steps.version.outputs.ref }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}
          submodules: recursive

      - name: Read package version
        id: version
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import subprocess
          import tomllib
          from pathlib import Path

          version = tomllib.loads(Path("just_py_bash/pyproject.toml").read_text())['project']['version']
          tag = f"v{version}"
          completed = subprocess.run(
              ["git", "tag", "-l", tag],
              check=True,
              capture_output=True,
              text=True,
          )
          tag_exists = "true" if tag in completed.stdout.splitlines() else "false"
          ref = subprocess.run(
              ["git", "rev-parse", "HEAD"],
              check=True,
              capture_output=True,
              text=True,
          ).stdout.strip()
          print(f"version={version}")
          print(f"tag={tag}")
          print(f"tag_exists={tag_exists}")
          print(f"ref={ref}")
          PY

      - name: Report decision
        run: |
          echo "version=${{ steps.version.outputs.version }}"
          echo "tag=${{ steps.version.outputs.tag }}"
          echo "tag_exists=${{ steps.version.outputs.tag_exists }}"
          echo "ref=${{ steps.version.outputs.ref }}"

      - name: Fail if tag already exists
        if: steps.version.outputs.tag_exists == 'true'
        run: |
          echo "Tag ${{ steps.version.outputs.tag }} already exists."
          exit 1

  release:
    needs: detect
    if: needs.detect.outputs.tag_exists != 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi-just-py-bash
      url: https://pypi.org/p/just-py-bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.detect.outputs.ref }}
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: vendor/just-bash/pnpm-lock.yaml

      - name: Build distributions
        run: make build-package

      - name: Create and push tag
        env:
          TAG: ${{ needs.detect.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
