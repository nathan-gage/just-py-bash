name: Release just-py-bash

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-just-py-bash-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      tag_exists: ${{ steps.version.outputs.tag_exists }}
      ref: ${{ steps.version.outputs.ref }}

    steps:
      - name: Validate workflow ref
        env:
          WORKFLOW_REF: ${{ github.ref }}
        run: |
          case "$WORKFLOW_REF" in
            refs/heads/main) ;;
            *)
              echo "Release workflows must be dispatched from refs/heads/main; got: $WORKFLOW_REF" >&2
              exit 1
              ;;
          esac

      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: main
          submodules: recursive
          persist-credentials: false

      - name: Read package version
        id: version
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import subprocess
          import tomllib
          from pathlib import Path

          version = tomllib.loads(Path("just_py_bash/pyproject.toml").read_text())['project']['version']
          tag = f"v{version}"
          completed = subprocess.run(
              ["git", "tag", "-l", tag],
              check=True,
              capture_output=True,
              text=True,
          )
          tag_exists = "true" if tag in completed.stdout.splitlines() else "false"
          ref = subprocess.run(
              ["git", "rev-parse", "HEAD"],
              check=True,
              capture_output=True,
              text=True,
          ).stdout.strip()
          print(f"version={version}")
          print(f"tag={tag}")
          print(f"tag_exists={tag_exists}")
          print(f"ref={ref}")
          PY

      - name: Report decision
        run: |
          echo "version=${{ steps.version.outputs.version }}"
          echo "tag=${{ steps.version.outputs.tag }}"
          echo "tag_exists=${{ steps.version.outputs.tag_exists }}"
          echo "ref=${{ steps.version.outputs.ref }}"

      - name: Fail if tag already exists
        if: steps.version.outputs.tag_exists == 'true'
        run: |
          echo "Tag ${{ steps.version.outputs.tag }} already exists."
          exit 1

  release:
    needs: detect
    if: needs.detect.outputs.tag_exists != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    environment:
      name: pypi-just-py-bash
      url: https://pypi.org/p/just-py-bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ needs.detect.outputs.ref }}
          submodules: recursive
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.11"
          enable-cache: true
          cache-suffix: release

      - name: Set up pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 8.15.9

      - name: Set up Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: vendor/just-bash/pnpm-lock.yaml

      - name: Build distributions
        run: make build-package

      - name: Create and push tag
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG: ${{ needs.detect.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$TAG"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.detect.outputs.tag }}
        run: gh release create "$TAG" dist/* --generate-notes

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always --check-url https://pypi.org/simple/ dist/*
