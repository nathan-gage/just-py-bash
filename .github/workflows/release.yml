name: Release just-py-bash

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-just-py-bash-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          submodules: recursive
          persist-credentials: false

      - name: Validate release tag semantics and main ancestry
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          git fetch origin --force +refs/heads/main:refs/remotes/origin/main
          python tools/release_metadata.py validate-tag just-py-bash --tag "$TAG_NAME"
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.11"
          enable-cache: true
          cache-suffix: release

      - name: Set up pnpm
        uses: pnpm/action-setup@v6.0.3
        with:
          version: 10.33.2

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: vendor/just-bash/pnpm-lock.yaml

      - name: Build distributions
        run: make build-package

      - name: Validate built distribution version matches tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: python tools/release_metadata.py validate-artifacts just-py-bash --tag "$TAG_NAME" --dist-dir dist

      - name: Check distribution metadata
        run: uvx twine check dist/*

      - name: Smoke test wheel
        shell: bash
        run: |
          wheel=$(echo dist/*.whl)
          uv run --isolated --no-project --with "$wheel" just-py-bash --help

      - name: Smoke test sdist
        shell: bash
        run: |
          sdist=$(echo dist/*.tar.gz)
          uv run --isolated --no-project --with "$sdist" just-py-bash --help

      - name: Upload distributions
        uses: actions/upload-artifact@v7.0.1
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    needs: [build]
    runs-on: ubuntu-latest

    environment:
      name: testpypi-just-py-bash
      url: https://test.pypi.org/project/just-py-bash/

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI
    needs: [publish-testpypi]
    runs-on: ubuntu-latest

    environment:
      name: pypi-just-py-bash
      url: https://pypi.org/project/just-py-bash/

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          packages-dir: dist/
          skip-existing: true

  github-release:
    name: Create GitHub release
    needs: [publish-pypi]
    if: needs.publish-pypi.result == 'success'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |-
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              --verify-tag \
              --generate-notes \
              --latest \
              dist/*
          fi
