name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: linux / py3.11 / node22
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: vendor/just-bash/pnpm-lock.yaml

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.9

      - name: Install dependencies and build vendored just-bash backend
        run: make install

      - name: Vendor bundled runtime payload
        run: make vendor-bundled-runtime

      - name: Format check
        run: make format-check

      - name: Lint
        run: make lint

      - name: Typecheck (mypy)
        run: make typecheck-mypy

      - name: Typecheck (pyright)
        run: make typecheck-pyright

      - name: Test
        run: make test
