name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  COLUMNS: 150
  UV_FROZEN: "1"
  UV_CACHE_DEPENDENCY_GLOB: |
    pyproject.toml
    uv.lock

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend / ubuntu / node22
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v6.0.1
        with:
          version: 8.15.9

      - name: Set up Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: vendor/just-bash/pnpm-lock.yaml

      - name: Build vendored backend and packaged runtime
        shell: bash
        env:
          npm_config_script_shell: bash
        run: |
          cd vendor/just-bash
          pnpm install --frozen-lockfile --ignore-scripts
          pnpm rebuild esbuild
          pnpm build
          cd ../..
          bash just_py_bash/tools/build_packaged_runtime.sh

      - name: Record backend artifact metadata
        shell: bash
        run: |
          mkdir -p .ci/backend-artifact
          printf '%s\n' "$GITHUB_SHA" > .ci/backend-artifact/github_sha.txt

      - name: Upload backend assets
        uses: actions/upload-artifact@v7.0.1
        with:
          name: backend-assets
          compression-level: 0
          path: |
            .ci/backend-artifact/github_sha.txt
            just_py_bash/src/just_bash/_vendor/just-bash/package.json
            just_py_bash/src/just_bash/_vendor/just-bash/dist/**
            just_py_bash/src/just_bash/_vendor/just-bash/vendor/**

  checks:
    name: checks / ubuntu / py3.11
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.11"
          enable-cache: true
          cache-python: false
          cache-suffix: checks
          cache-dependency-glob: ${{ env.UV_CACHE_DEPENDENCY_GLOB }}

      - name: Install Python development dependencies
        run: make install-python

      - name: Format check
        env:
          UV_NO_SYNC: "1"
        run: make format-check

      - name: Lint
        env:
          UV_NO_SYNC: "1"
        run: make lint

      - name: Typecheck (mypy)
        env:
          UV_NO_SYNC: "1"
        run: make typecheck-mypy

      - name: Typecheck (pyright)
        env:
          UV_NO_SYNC: "1"
        run: make typecheck-pyright

  tests:
    name: test / ubuntu / py${{ matrix.python-version }} / node22
    needs: backend
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-python: false
          cache-suffix: tests-${{ matrix.python-version }}
          cache-dependency-glob: ${{ env.UV_CACHE_DEPENDENCY_GLOB }}

      - name: Set up Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: "22"

      - name: Install Python test dependencies
        run: make install-python-tests

      - name: Download backend assets
        uses: actions/download-artifact@v8.0.1
        with:
          name: backend-assets
          path: .

      - name: Verify backend assets and configure packaged runtime env
        shell: python
        run: |
          import os
          from pathlib import Path

          sha_path = Path('.ci/backend-artifact/github_sha.txt')
          actual_sha = sha_path.read_text(encoding='utf-8').strip()
          expected_sha = os.environ['GITHUB_SHA']
          if actual_sha != expected_sha:
              raise SystemExit(f'Backend artifact SHA mismatch: {actual_sha} != {expected_sha}')

          runtime_root = Path('just_py_bash/src/just_bash/_vendor/just-bash').resolve()
          package_json = runtime_root / 'package.json'
          if not package_json.is_file():
              raise SystemExit(f'Missing packaged runtime metadata at {package_json}')

          candidates = [runtime_root / 'dist/index.js', runtime_root / 'dist/bundle/index.js']
          runtime_entry = next((path for path in candidates if path.is_file()), None)
          if runtime_entry is None:
              raise SystemExit(f'Missing packaged runtime entrypoint under {runtime_root}')

          github_env = Path(os.environ['GITHUB_ENV'])
          with github_env.open('a', encoding='utf-8') as handle:
              handle.write(f'JUST_BASH_JS_ENTRY={runtime_entry}\n')
              handle.write(f'JUST_BASH_PACKAGE_JSON={package_json}\n')
              handle.write(f'JUST_BASH_TEST_PACKAGED_JS_ENTRY={runtime_entry}\n')
              handle.write(f'JUST_BASH_TEST_PACKAGED_PACKAGE_JSON={package_json}\n')

      - name: Run non-packaging test suite
        env:
          UV_NO_SYNC: "1"
        run: make test-non-packaging

  required:
    name: ci / required
    needs:
      - backend
      - checks
      - tests
    if: ${{ always() }}
    runs-on: ubuntu-latest

    steps:
      - name: Verify required CI jobs passed
        shell: bash
        env:
          BACKEND_RESULT: ${{ needs.backend.result }}
          CHECKS_RESULT: ${{ needs.checks.result }}
          TESTS_RESULT: ${{ needs.tests.result }}
        run: |-
          echo "backend=$BACKEND_RESULT"
          echo "checks=$CHECKS_RESULT"
          echo "tests=$TESTS_RESULT"

          if [[ "$BACKEND_RESULT" == "cancelled" || "$CHECKS_RESULT" == "cancelled" || "$TESTS_RESULT" == "cancelled" ]]; then
            echo "CI run was cancelled or superseded by a newer run."
            exit 0
          fi

          [[ "$BACKEND_RESULT" == "success" ]]
          [[ "$CHECKS_RESULT" == "success" ]]
          [[ "$TESTS_RESULT" == "success" ]]
