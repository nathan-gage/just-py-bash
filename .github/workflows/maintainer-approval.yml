name: Maintainer approval

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  pull_request_review:
    types:
      - submitted
      - dismissed

permissions:
  contents: read
  pull-requests: read

jobs:
  required:
    name: maintainer approval / required
    runs-on: ubuntu-latest

    steps:
      - name: Enforce maintainer approval policy
        uses: actions/github-script@v8
        env:
          REQUIRED_APPROVER: nathan-gage
        with:
          script: |-
            const approver = process.env.REQUIRED_APPROVER;
            const pr = context.payload.pull_request;

            if (!pr) {
              core.setFailed('No pull request payload was available.');
              return;
            }

            core.info(`event=${context.eventName}`);
            core.info(`author=${pr.user.login}`);
            core.info(`head_sha=${pr.head.sha}`);
            core.info(`required_approver=${approver}`);

            if (pr.user.login === approver) {
              core.info('Pull request authored by required approver; explicit approval is not required.');
              return;
            }

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const relevantStates = new Set(['APPROVED', 'CHANGES_REQUESTED', 'DISMISSED']);
            const relevantReviews = reviews
              .filter((review) => review.user?.login === approver && relevantStates.has(review.state))
              .sort((left, right) => {
                const leftTime = new Date(left.submitted_at ?? left.created_at ?? 0).getTime();
                const rightTime = new Date(right.submitted_at ?? right.created_at ?? 0).getTime();
                return leftTime - rightTime;
              });

            const latestReview = relevantReviews.at(-1);
            if (!latestReview) {
              core.setFailed(`Pull request requires an approval from @${approver}.`);
              return;
            }

            core.info(`latest_review_state=${latestReview.state}`);
            core.info(`latest_review_commit_id=${latestReview.commit_id}`);

            if (latestReview.state !== 'APPROVED') {
              core.setFailed(
                `Latest review from @${approver} is ${latestReview.state.toLowerCase()}, not approved.`
              );
              return;
            }

            if (latestReview.commit_id !== pr.head.sha) {
              core.setFailed(
                `Approval from @${approver} does not cover the current head commit ${pr.head.sha}.`
              );
              return;
            }

            core.info(`Current head commit is approved by @${approver}.`);
