name: Sync bundled runtime

on:
  workflow_dispatch:
  schedule:
    - cron: "41 5 * * 1"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: bundled-runtime-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8

      - name: Sync Python dependencies
        run: uv sync --all-groups

      - name: Ensure automation labels exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create automation --color 0E8A16 --description "Automated pull request" --force
          gh label create bundled-runtime --color 5319E7 --description "Updates the bundled Node runtime package" --force
          gh label create release-candidate --color B60205 --description "Run full CI and consider this PR for a manual release" --force

      - name: Sync bundled runtime version
        id: sync
        run: uv run python just_bash_bundled_runtime/tools/sync_version.py

      - name: Refresh uv.lock after version bump
        if: steps.sync.outputs.changed == 'true'
        run: uv lock

      - name: Create pull request
        if: steps.sync.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: automation/sync-bundled-runtime
          delete-branch: true
          commit-message: >-
            chore: bump bundled runtime to
            ${{ steps.sync.outputs.to_version }}
          title: >-
            chore: bump bundled runtime to
            ${{ steps.sync.outputs.to_version }}
          body: |
            Automated bundled runtime update.

            - previous version: `${{ steps.sync.outputs.from_version }}`
            - new version: `${{ steps.sync.outputs.to_version }}`
            - major line: `${{ steps.sync.outputs.target_major }}`

            This PR updates `just_bash_bundled_runtime/pyproject.toml` to the latest Node.js LTS patch in the tracked major line.
            It is labeled `release-candidate`, so Full CI will run the expensive packaging and compatibility suite before you decide whether to merge and publish it.
          labels: |
            automation
            bundled-runtime
            release-candidate
