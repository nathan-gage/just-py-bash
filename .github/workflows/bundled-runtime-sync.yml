name: Sync bundled runtime

on:
  workflow_dispatch:
  schedule:
    - cron: "41 5 * * 1"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: bundled-runtime-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Validate workflow ref
        env:
          WORKFLOW_REF: ${{ github.ref }}
        run: |
          case "$WORKFLOW_REF" in
            refs/heads/main) ;;
            *)
              echo "Sync workflow must run from refs/heads/main; got: $WORKFLOW_REF" >&2
              exit 1
              ;;
          esac

      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: main
          submodules: recursive
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.11"
          enable-cache: true
          cache-suffix: bundled-runtime-sync

      - name: Sync Python dependencies
        run: uv sync --all-groups

      - name: Ensure automation labels exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create automation --color 0E8A16 --description "Automated pull request" --force
          gh label create bundled-runtime --color 5319E7 --description "Updates the bundled Node runtime package" --force
          gh label create dependencies --color 0366D6 --description "Dependency or upstream version update" --force
          gh label create release-candidate --color B60205 --description "Run full CI and auto-tag eligible release PRs when merged" --force

      - name: Sync bundled runtime version
        id: sync
        run: uv run python just_bash_bundled_runtime/tools/sync_version.py

      - name: Create pull request
        if: steps.sync.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          branch: automation/sync-bundled-runtime
          delete-branch: true
          commit-message: >-
            chore: bump bundled runtime to
            ${{ steps.sync.outputs.to_version }}
          title: >-
            chore: bump bundled runtime to
            ${{ steps.sync.outputs.to_version }}
          body: |
            Automated bundled runtime update.

            - previous runtime version: `${{ steps.sync.outputs.from_version }}`
            - new runtime version: `${{ steps.sync.outputs.to_version }}`
            - major line: `${{ steps.sync.outputs.target_major }}`
            - release tag on merge: `${{ steps.sync.outputs.release_tag }}`

            `just-bash-bundled-runtime` now uses dynamic versioning from Git tags. The tracked Node runtime version lives in `[tool.just-bash-bundled-runtime]`, separate from the package's dynamic release version source.
            This PR updates the tracked Node.js LTS patch in that config.
            It is labeled `release-candidate`, so Full CI will run the expensive packaging and compatibility suite. When it is merged to `main`, the auto-tag workflow will create `${{ steps.sync.outputs.release_tag }}` on the merge commit and the tag-driven release workflow will publish it.
          labels: |-
            automation
            bundled-runtime
            dependencies
            release-candidate
